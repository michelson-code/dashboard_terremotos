<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitoramento Sísmico Global - Dashboard Profissional</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        h1 { text-align: center; color: #2c3e50; margin: 10px 0 5px 0; }
        .data-range { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        
        /* Controles e KPIs */
        .header-controls { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .control-panel { flex: 2; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px; }
        .kpi-container { flex: 1.2; display: flex; gap: 10px; }
        .kpi-card { flex: 1; background: white; padding: 10px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; }
        .kpi-card span { font-size: 12px; color: #7f8c8d; text-transform: uppercase; }
        .kpi-card b { font-size: 18px; display: block; color: #c0392b; margin-top: 5px; }

        /* Layout Grid: Mapa + Gráficos Laterais */
        .visual-grid { display: flex; gap: 15px; height: 65vh; margin-bottom: 15px; }
        #mapa { flex: 2; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .side-charts { flex: 0.8; display: flex; flex-direction: column; gap: 10px; }
        .chart-box { flex: 1; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 5px; }

        /* Tabela de Dados */
        .table-section { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 10px; }
        .table-wrapper { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #2c3e50; color: white; padding: 12px; position: sticky; top: 0; text-align: left; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f1f4f9; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <h1>Monitoramento Sísmico Global</h1>
    <div class="data-range" id="data-info">Processando período dos dados...</div>

    <div class="header-controls">
        <div class="control-panel">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <label><b>Magnitude Mínima:</b> <span id="mag-val">2.5</span></label>
                <div style="font-size: 14px;">
                    <input type="radio" name="scale" value="linear" checked> Linear 
                    <input type="radio" name="scale" value="log" style="margin-left:10px;"> Exponencial (Energia)
                </div>
            </div>
            <input type="range" id="mag-slider" min="0" max="8" step="0.5" value="2.5" style="width: 100%;">
            
            <div style="display:flex; gap:10px; align-items:center; font-size: 14px;">
                <b>Filtro de Data (UTC):</b>
                <input type="date" id="date-start"> até <input type="date" id="date-end">
            </div>
        </div>
        
        <div class="kpi-container">
            <div class="kpi-card"><span>Eventos Filtrados</span><b id="total-eventos" style="color:#2980b9;">0</b></div>
            <div class="kpi-card"><span>Mag Máxima</span><b id="max-mag" style="color:#c0392b">0.0</b></div>
            <div class="kpi-card"><span>Último ID</span><b id="last-id" style="font-size:11px; color:#5c2c16">N/A</b></div>
        </div>
    </div>

    <div class="visual-grid">
        <div id="mapa"></div>
        <div class="side-charts">
            <div id="hist" class="chart-box"></div>
            <div id="series" class="chart-box"></div>
        </div>
    </div>

    <div class="table-section">
        <h3 style="margin-top:0; color:#2c3e50;">Inspeção Detalhada de Eventos</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID Evento</th>
                        <th>Data (Brasília)</th>
                        <th>Hora (UTC)</th>
                        <th>Lat/Lon</th>
                        <th>Mag</th>
                        <th>Escala</th>
                        <th>Prof (km)</th>
                        <th>Local</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const url = 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_month.csv';
        let rawData = [];

        // Escala de cores customizada: Laranja -> Vermelho -> Marrom
        const customColorScale = [
            [0.0, '#e67e22'], // Laranja
            [0.5, '#c0392b'], // Vermelho
            [1.0, '#5c2c16']  // Marrom Escuro
        ];

        d3.csv(url).then(data => {
            // Processamento dos dados
            rawData = data.map(d => {
                const dateUTC = new Date(d.time); // Data original em UTC da USGS
                const brDate = new Date(dateUTC.getTime() - (3 * 60 * 60 * 1000)); // Conversão para UTC-3
                return {
                    ...d,
                    id: d.id || "N/A",
                    mag: +d.mag || 0,
                    lat: +d.latitude,
                    lon: +d.longitude,
                    depth: +d.depth,
                    magType: d.magType || "N/A",
                    brTime: brDate.toLocaleString('pt-BR'),
                    utcTime: dateUTC.toLocaleString('pt-BR', { timeZone: 'UTC' }),
                    utcTimestamp: dateUTC.getTime(),
                    dateIso: dateUTC.toISOString().split('T')[0]
                };
            });

            if(rawData.length > 0) {
                const utcTimes = rawData.map(d => d.utcTimestamp);
                const minUtc = new Date(Math.min(...utcTimes));
                const maxUtc = new Date(Math.max(...utcTimes));

                const formatUTC = (dateObj) => {
                    const d = String(dateObj.getUTCDate()).padStart(2, '0');
                    const m = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
                    const y = dateObj.getUTCFullYear();
                    return `${d}/${m}/${y}`;
                };

                const startStr = formatUTC(minUtc);
                const endStr = formatUTC(maxUtc);
                document.getElementById('data-info').innerText = `Dados disponíveis de ${startStr} até ${endStr} (Horário UTC) | Fonte: USGS`;
            }

            update();
        });

        // Eventos de Filtro
        document.getElementById('mag-slider').addEventListener('input', e => {
            document.getElementById('mag-val').innerText = e.target.value;
            update();
        });
        document.querySelectorAll('input[name="scale"]').forEach(r => r.onchange = update);
        document.getElementById('date-start').onchange = update;
        document.getElementById('date-end').onchange = update;

        function update() {
            const minMag = +document.getElementById('mag-slider').value;
            const start = document.getElementById('date-start').value;
            const end = document.getElementById('date-end').value;
            const isLog = document.querySelector('input[name="scale"]:checked').value === 'log';

            let filtered = rawData.filter(d => d.mag >= minMag);
            if(start) filtered = filtered.filter(d => d.dateIso >= start);
            if(end) filtered = filtered.filter(d => d.dateIso <= end);

            // Atualização de KPIs
            document.getElementById('total-eventos').innerText = filtered.length.toLocaleString();
            document.getElementById('max-mag').innerText = filtered.length ? Math.max(...filtered.map(d=>d.mag)).toFixed(1) : "0.0";
            document.getElementById('last-id').innerText = filtered.length ? filtered[0].id : "N/A";

            // 1. Mapa Mundi (Cores Customizadas: Laranja -> Vermelho -> Marrom)
            const sizes = filtered.map(d => isLog ? Math.pow(2, d.mag) * 0.4 : d.mag * 3.5);
            Plotly.newPlot('mapa', [{
                type: 'scattergeo', lat: filtered.map(d=>d.lat), lon: filtered.map(d=>d.lon),
                marker: { 
                    size: sizes, 
                    color: filtered.map(d=>d.mag), 
                    colorscale: customColorScale, // Aplicação da escala customizada
                    showscale: true,
                    colorbar: { title: 'Mag', thickness: 15, len: 0.7 }
                },
                text: filtered.map(d=>`ID: ${d.id}<br>${d.place}<br>Mag: ${d.mag} (${d.magType})<br>UTC: ${d.utcTime}`)
            }], { 
                geo: { projection: { type: 'natural earth' }, showland: true, landcolor: '#cccccc' },
                margin: { t: 40, b: 0, l: 0, r: 0 },
                title: { text: 'Distribuição Geográfica de Epicentros', font: { size: 16 } }
            });

            // 2. Histograma (Cor ajustada para combinar com o mapa)
            Plotly.newPlot('hist', [{ x: filtered.map(d=>d.mag), type: 'histogram', marker:{color:'#c0392b'} }], 
                { title: 'Frequência por Magnitude', margin: {t:40, b:30, l:40, r:10}, height: 200, template: 'plotly_white' });

            // 3. Série Temporal
            const counts = d3.rollup(filtered, v => v.length, d => d.dateIso);
            const sortedDates = Array.from(counts.keys()).sort();
            Plotly.newPlot('series', [{
                x: sortedDates, y: sortedDates.map(d => counts.get(d)),
                type: 'scatter', mode: 'lines+markers', line: {color: '#5c2c16', width: 3}
            }], { title: 'Eventos por Dia (UTC)', margin: {t:40, b:30, l:40, r:10}, height: 200, template: 'plotly_white' });

            // 4. Planilha Completa
            document.getElementById('table-body').innerHTML = filtered.slice(0, 150).map(d => `
                <tr>
                    <td><small style="color:#7f8c8d">${d.id}</small></td>
                    <td><b>${d.brTime}</b></td>
                    <td style="color:#2980b9">${d.utcTime}</td>
                    <td>${d.lat.toFixed(3)}, ${d.lon.toFixed(3)}</td>
                    <td style="color:#c0392b"><b>${d.mag.toFixed(1)}</b></td>
                    <td><span style="background:#eee; padding:2px 5px; border-radius:3px">${d.magType}</span></td>
                    <td>${d.depth.toFixed(1)}</td>
                    <td>${d.place}</td>
                </tr>
            `).join('');
        }

        // Ajuste responsivo
        window.onresize = () => Plotly.Plots.resize('mapa');
    </script>
</body>
</html>
